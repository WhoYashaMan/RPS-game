<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RPS Game</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .screen { display: none; width: 100%; max-width: 420px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  h1 { font-size: 28px; font-weight: 700; text-align: center; }
  h2 { font-size: 20px; font-weight: 600; text-align: center; }
  input[type="text"] { width: 100%; padding: 14px 18px; font-size: 18px; border-radius: 14px; border: 1.5px solid #333; background: #1a1a1a; color: #fff; text-align: center; outline: none; }
  input[type="text"]:focus { border-color: #555; }
  .btn-row { display: flex; gap: 14px; width: 100%; justify-content: center; }
  .big-btn { width: 80px; height: 80px; border-radius: 20px; border: 1.5px solid #333; background: #1a1a1a; color: #fff; font-size: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s, transform 0.1s; }
  .big-btn:active { background: #2a2a2a; transform: scale(0.95); }
  .action-btn { width: 100%; padding: 16px; font-size: 18px; font-weight: 600; border-radius: 14px; border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  .action-btn:active { transform: scale(0.98); opacity: 0.85; }
  .action-btn.primary { background: #fff; color: #000; }
  .action-btn.secondary { background: #1a1a1a; color: #fff; border: 1.5px solid #333; }
  .game-list { width: 100%; display: flex; flex-direction: column; gap: 10px; max-height: 55vh; overflow-y: auto; }
  .game-item { background: #1a1a1a; border: 1.5px solid #333; border-radius: 14px; padding: 14px 18px; cursor: pointer; transition: border-color 0.15s; }
  .game-item:active { border-color: #fff; }
  .game-item .gi-title { font-size: 16px; font-weight: 600; }
  .game-item .gi-sub { font-size: 13px; color: #888; margin-top: 4px; }
  .players-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; width: 100%; }
  .player-chip { background: #1a1a1a; border: 1.5px solid #333; border-radius: 30px; padding: 8px 16px; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .player-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
  .player-chip.ready .dot { background: #4ade80; }
  .player-chip.out { opacity: 0.35; text-decoration: line-through; }
  .choice-row { display: flex; gap: 16px; justify-content: center; width: 100%; }
  .choice-btn { flex: 1; max-width: 90px; height: 90px; border-radius: 20px; border: 1.5px solid #333; background: #1a1a1a; font-size: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s, border-color 0.15s, transform 0.1s; }
  .choice-btn:active { transform: scale(0.95); }
  .choice-btn.chosen { border-color: #fff; background: #2a2a2a; }
  .choice-btn:disabled { opacity: 0.4; cursor: default; }
  .round-num { font-size: 42px; font-weight: 700; }
  .result-box { background: #1a1a1a; border: 1.5px solid #333; border-radius: 16px; padding: 20px; width: 100%; }
  .result-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #222; font-size: 15px; }
  .result-item:last-child { border-bottom: none; }
  .result-item.eliminated { opacity: 0.4; text-decoration: line-through; }
  .winner-badge { font-size: 20px; }
  .score-card { background: #1a1a1a; border: 1.5px solid #333; border-radius: 14px; padding: 14px 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; }
  .score-card .sc-icon { font-size: 28px; }
  .score-card .sc-value { font-size: 16px; font-weight: 600; }
  .score-card .sc-sub { font-size: 13px; color: #aaa; margin-top: 2px; }
  .rank-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #222; }
  .rank-item:last-child { border-bottom: none; }
  .rank-num { font-size: 14px; color: #666; width: 20px; }
  .rank-name { flex: 1; font-size: 15px; }
  .rank-wins { font-size: 14px; color: #888; }
  .status-text { font-size: 14px; color: #777; text-align: center; }
  .big-emoji { font-size: 64px; text-align: center; }
  select { width: 100%; padding: 14px 18px; font-size: 16px; border-radius: 14px; border: 1.5px solid #333; background: #1a1a1a; color: #fff; outline: none; appearance: none; text-align: center; }
  .back-btn { align-self: flex-start; background: none; border: none; color: #888; font-size: 22px; cursor: pointer; padding: 0; }
  .back-btn:active { color: #fff; }
  .empty-text { color: #555; font-size: 15px; text-align: center; padding: 30px 0; }
</style>
</head>
<body>

<div id="screen-name" class="screen active">
  <div class="big-emoji">✊✌️🖐</div>
  <input type="text" id="name-input" maxlength="20" autocomplete="off" />
  <div class="btn-row">
    <button class="big-btn" onclick="goMenu('create')">＋</button>
    <button class="big-btn" onclick="goMenu('join')">✕</button>
    <button class="big-btn" onclick="goMenu('score')">＝</button>
  </div>
</div>

<div id="screen-create" class="screen">
  <button class="back-btn" onclick="showScreen('screen-name')">←</button>
  <select id="max-players-select"></select>
  <button class="action-btn primary" onclick="createGame()">＋</button>
</div>

<div id="screen-join" class="screen">
  <button class="back-btn" onclick="showScreen('screen-name')">←</button>
  <div id="join-list" class="game-list"><p class="empty-text">…</p></div>
  <button class="action-btn secondary" onclick="loadOpenGames()">↻</button>
</div>

<div id="screen-lobby" class="screen">
  <p class="status-text" id="lobby-sub"></p>
  <div id="lobby-players" class="players-grid"></div>
  <button class="action-btn secondary" id="lobby-start-btn" style="display:none" onclick="startGame()">▶</button>
  <button class="action-btn secondary" onclick="leaveGame()">←</button>
</div>

<div id="screen-play" class="screen">
  <div class="round-num" id="round-display">1</div>
  <div class="choice-row">
    <button class="choice-btn" id="btn-rock" onclick="makeChoice('rock')">✊</button>
    <button class="choice-btn" id="btn-scissors" onclick="makeChoice('scissors')">✌️</button>
    <button class="choice-btn" id="btn-paper" onclick="makeChoice('paper')">🖐</button>
  </div>
  <div id="waiting-choices" class="players-grid"></div>
</div>

<div id="screen-results" class="screen">
  <div class="round-num" id="results-round"></div>
  <div id="results-box" class="result-box"></div>
  <button class="action-btn primary" id="next-round-btn" onclick="nextRound()">▶</button>
  <button class="action-btn secondary" onclick="leaveGame()">←</button>
</div>

<div id="screen-score" class="screen">
  <button class="back-btn" onclick="showScreen('screen-name')">←</button>
  <div id="score-content" style="width:100%"></div>
</div>

<script>
const firebaseConfig = { databaseURL: "https://rps-game-9bfd0-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myName = '';
let myId = '';
let currentGameId = null;
let isHost = false;
let gameRef = null;
let gameListener = null;

const sel = document.getElementById('max-players-select');
for (let i = 2; i <= 67; i++) {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = i;
  if (i === 4) opt.selected = true;
  sel.appendChild(opt);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goMenu(action) {
  const nameVal = document.getElementById('name-input').value.trim();
  if (!nameVal) { document.getElementById('name-input').focus(); return; }
  myName = nameVal;
  myId = myName + '_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
  if (action === 'create') showScreen('screen-create');
  if (action === 'join') { showScreen('screen-join'); loadOpenGames(); }
  if (action === 'score') { showScreen('screen-score'); loadScore(); }
}

function generateGameId() { return Math.random().toString(36).substr(2, 8).toUpperCase(); }

function createGame() {
  const maxP = parseInt(document.getElementById('max-players-select').value);
  const gameId = generateGameId();
  currentGameId = gameId;
  isHost = true;
  db.ref('games/' + gameId).set({
    host: myName, hostId: myId, maxPlayers: maxP, status: 'waiting', createdAt: Date.now(),
    players: { [myId]: { name: myName } }
  }).then(() => { attachGameListener(gameId); showScreen('screen-lobby'); });
}

function loadOpenGames() {
  const list = document.getElementById('join-list');
  list.innerHTML = '<p class="empty-text">…</p>';
  db.ref('games').orderByChild('status').equalTo('waiting').once('value', snap => {
    const games = snap.val();
    list.innerHTML = '';
    if (!games) { list.innerHTML = '<p class="empty-text">—</p>'; return; }
    Object.entries(games).forEach(([id, g]) => {
      const playerCount = g.players ? Object.keys(g.players).length : 0;
      if (playerCount >= g.maxPlayers) return;
      const div = document.createElement('div');
      div.className = 'game-item';
      div.innerHTML = `<div class="gi-title">${g.host}</div><div class="gi-sub">${playerCount} / ${g.maxPlayers}</div>`;
      div.onclick = () => joinGame(id);
      list.appendChild(div);
    });
    if (!list.children.length) list.innerHTML = '<p class="empty-text">—</p>';
  });
}

function joinGame(gameId) {
  currentGameId = gameId;
  isHost = false;
  db.ref('games/' + gameId + '/players/' + myId).set({ name: myName }).then(() => {
    attachGameListener(gameId);
    showScreen('screen-lobby');
  });
}

function attachGameListener(gameId) {
  if (gameListener) gameRef.off('value', gameListener);
  gameRef = db.ref('games/' + gameId);
  gameListener = gameRef.on('value', snap => {
    const g = snap.val();
    if (!g || g.status === 'abandoned') { currentGameId = null; showScreen('screen-name'); return; }
    if (g.status === 'waiting') updateLobby(g);
    else if (g.status === 'playing') updatePlay(g);
    else if (g.status === 'results') showResults(g);
  });
}

function updateLobby(g) {
  showScreen('screen-lobby');
  const players = g.players ? Object.values(g.players) : [];
  const count = players.length;
  document.getElementById('lobby-sub').textContent = count + ' / ' + g.maxPlayers;
  const grid = document.getElementById('lobby-players');
  grid.innerHTML = '';
  players.forEach(p => {
    const chip = document.createElement('div');
    chip.className = 'player-chip';
    chip.innerHTML = `<span class="dot"></span>${p.name}`;
    grid.appendChild(chip);
  });
  const startBtn = document.getElementById('lobby-start-btn');
  startBtn.style.display = (isHost && count >= 2) ? 'block' : 'none';
}

function startGame() {
  db.ref('games/' + currentGameId).transaction(g => {
    if (!g) return g;
    const active = {};
    Object.keys(g.players || {}).forEach(id => active[id] = true);
    g.status = 'playing';
    g.round = 1;
    g.choices = null;
    g.active = active;
    g.startedAt = Date.now();
    return g;
  });
}

function updatePlay(g) {
  showScreen('screen-play');
  document.getElementById('round-display').textContent = g.round || 1;
  const active = g.active || {};
  const activeIds = Object.keys(active);
  const choices = g.choices || {};
  const myChosen = choices[myId];
  const amActive = !!active[myId];
  ['rock','scissors','paper'].forEach(c => {
    const btn = document.getElementById('btn-' + c);
    btn.classList.toggle('chosen', myChosen === c);
    btn.disabled = !!myChosen || !amActive;
  });
  const waiting = document.getElementById('waiting-choices');
  waiting.innerHTML = '';
  const players = g.players || {};
  activeIds.forEach(pid => {
    const chip = document.createElement('div');
    chip.className = 'player-chip' + (choices[pid] ? ' ready' : '');
    chip.innerHTML = `<span class="dot"></span>${players[pid] ? players[pid].name : '?'}`;
    waiting.appendChild(chip);
  });
  const done = activeIds.filter(id => choices[id]).length;
  if (done === activeIds.length && activeIds.length >= 2 && isHost) {
    setTimeout(() => calcResults(g), 600);
  }
}

const beats = { rock: 'scissors', scissors: 'paper', paper: 'rock' };

function calcResults(g) {
  const active = g.active || {};
  const choices = g.choices || {};
  const players = g.players || {};
  const activeIds = Object.keys(active);
  const distinctChoices = [...new Set(activeIds.map(id => choices[id]))];

  if (distinctChoices.length === 1 || distinctChoices.length === 3) {
    db.ref('games/' + currentGameId).update({
      status: 'results', tie: true, finished: false
    });
    return;
  }

  const [a, b] = distinctChoices;
  const winningChoice = beats[a] === b ? a : b;
  const survivors = {};
  const eliminatedNames = [];
  activeIds.forEach(id => {
    if (choices[id] === winningChoice) survivors[id] = true;
    else eliminatedNames.push(players[id] ? players[id].name : '?');
  });
  const survivorIds = Object.keys(survivors);
  const finished = survivorIds.length === 1;

  const updates = {
    status: 'results', tie: false, finished,
    active: survivors,
    eliminatedNames
  };
  if (finished) {
    updates.winnerName = players[survivorIds[0]] ? players[survivorIds[0]].name : '?';
  }
  db.ref('games/' + currentGameId).update(updates);
  db.ref('games/' + currentGameId + '/round').transaction(r => (r || 1) + (finished ? 0 : 1));

  if (finished) {
    const duration = Math.round((Date.now() - g.startedAt) / 1000);
    const totalPlayers = Object.keys(players).length;
    db.ref('history').push({
      players: totalPlayers, winner: updates.winnerName, duration,
      names: Object.values(players).map(p => p.name), at: Date.now()
    });
    const key = updates.winnerName.replace(/[.#$\[\]]/g, '_');
    db.ref('nameWins/' + key).transaction(v => (v || 0) + 1);
  }
}

function showResults(g) {
  showScreen('screen-results');
  document.getElementById('results-round').textContent = g.tie ? '↻' : (g.finished ? '🏆' : (g.round || 1));
  const box = document.getElementById('results-box');
  box.innerHTML = '';
  if (g.tie) {
    box.innerHTML = '<div class="result-item">↻ ↻ ↻</div>';
  } else if (g.finished) {
    box.innerHTML = `<div class="result-item">🏆 ${g.winnerName}</div>`;
  } else {
    (g.eliminatedNames || []).forEach(name => {
      box.innerHTML += `<div class="result-item eliminated">${name}</div>`;
    });
    const active = g.active || {};
    const players = g.players || {};
    Object.keys(active).forEach(id => {
      box.innerHTML += `<div class="result-item">${players[id] ? players[id].name : '?'} ✓</div>`;
    });
  }
  document.getElementById('next-round-btn').style.display = isHost ? 'block' : 'none';
  document.getElementById('next-round-btn').textContent = g.finished ? '✕' : '▶';
}

function nextRound() {
  if (currentGameId === null) return;
  db.ref('games/' + currentGameId).once('value', snap => {
    const g = snap.val();
    if (!g) return;
    if (g.finished) {
      leaveGame();
    } else {
      db.ref('games/' + currentGameId).update({ status: 'playing', choices: null });
    }
  });
}

function leaveGame() {
  if (gameRef) gameRef.off('value', gameListener);
  if (currentGameId) {
    const gid = currentGameId;
    db.ref('games/' + gid + '/players/' + myId).remove();
    db.ref('games/' + gid + '/active/' + myId).remove();
    db.ref('games/' + gid).once('value', snap => {
      const g = snap.val();
      if (!g) return;
      const remainingPlayers = g.players ? Object.keys(g.players).length : 0;
      if (remainingPlayers < 2) {
        db.ref('games/' + gid).update({ status: 'abandoned' });
      }
    });
  }
  currentGameId = null;
  isHost = false;
  showScreen('screen-name');
}

function loadScore() {
  const content = document.getElementById('score-content');
  content.innerHTML = '<p class="empty-text">…</p>';
  Promise.all([
    db.ref('history').orderByChild('at').limitToLast(100).once('value'),
    db.ref('nameWins').orderByValue().limitToLast(10).once('value')
  ]).then(([histSnap, winsSnap]) => {
    const history = histSnap.val() ? Object.values(histSnap.val()) : [];
    const nameWins = winsSnap.val() || {};
    content.innerHTML = '';
    if (!history.length) { content.innerHTML = '<p class="empty-text">—</p>'; return; }

    const sorted = [...history].sort((a,b) => a.duration - b.duration);
    const fastest = sorted[0];
    const slowest = sorted[sorted.length-1];
    const biggestGame = [...history].sort((a,b) => b.players - a.players)[0];
    const sec = s => { if (s < 60) return s + 's'; return Math.floor(s/60) + 'm ' + (s%60) + 's'; };

    content.innerHTML = `
      <div class="score-card"><span class="sc-icon">⚡</span><div><div class="sc-value">${sec(fastest.duration)}</div><div class="sc-sub">${fastest.winner} · ${fastest.players}p</div></div></div>
      <div class="score-card"><span class="sc-icon">🐢</span><div><div class="sc-value">${sec(slowest.duration)}</div><div class="sc-sub">${slowest.winner} · ${slowest.players}p</div></div></div>
      <div class="score-card"><span class="sc-icon">👥</span><div><div class="sc-value">${biggestGame.players}</div><div class="sc-sub">${biggestGame.winner}</div></div></div>
      <div class="score-card" style="display:block">
        <span style="font-size:20px">🏆</span>
        ${Object.entries(nameWins).sort((a,b)=>b[1]-a[1]).map(([name,wins],i)=>`
          <div class="rank-item"><span class="rank-num">${i+1}</span><span class="rank-name">${name.replace(/_/g,' ')}</span><span class="rank-wins">${wins}</span></div>`).join('')}
      </div>
    `;
  });
}

if (window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}
</script>
</body>
</html>
